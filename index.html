<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rustvani</title>

<!--
  VAD dependency — must load before ES modules.
  In npm package: replace with import { MicVAD } from '@ricky0123/vad-web'
-->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  :root {
    --bg:      #080808;
    --surface: #0f0f0f;
    --border:  #1c1c1c;
    --dim:     #2e2e2e;
    --muted:   #4a4a4a;
    --text:    #c8c8c8;
    --green:   #3ddc84;
    --amber:   #f5a623;
    --red:     #ff4444;
    --blue:    #4d9cff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr 340px;
    grid-template-areas:
      "header  header"
      "main    sidebar"
      "footer  footer";
    gap: 1px;
    background: var(--border);
  }

  header {
    grid-area: header;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
  }

  .logo { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.2em; color: var(--muted); }
  .logo span { color: var(--green); }

  .header-right { display: flex; gap: 20px; }
  .stat-pill { font-size: 0.7rem; color: var(--muted); display: flex; gap: 6px; }
  .stat-pill .val     { color: var(--text); }
  .stat-pill .val.red { color: var(--red); }

  main {
    grid-area: main;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 20px;
    overflow: hidden;
  }

  #transcript {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
    padding-right: 4px;
  }
  #transcript::-webkit-scrollbar { width: 3px; }
  #transcript::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .tx-entry { display: flex; flex-direction: column; gap: 2px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  .tx-entry.user { align-items: flex-end; }
  .tx-entry.bot  { align-items: flex-start; }
  .tx-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; margin: 0 4px; }

  .tx-bubble {
    max-width: 80%; padding: 8px 12px; border-radius: 3px;
    font-size: 0.8rem; line-height: 1.5;
  }
  .tx-entry.user .tx-bubble { background: #0d1f12; color: var(--green); border: 1px solid #1a3322; }
  .tx-entry.bot  .tx-bubble { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .tx-entry.bot  .tx-bubble.streaming::after {
    content: '▋'; color: var(--green); animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .tx-placeholder { color: var(--muted); font-size: 0.75rem; text-align: center; margin: auto; opacity: 0.5; }

  .connect-row { display: flex; gap: 8px; }

  #ws-url {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem; padding: 9px 12px; border-radius: 3px; outline: none;
    transition: border-color 0.15s;
  }
  #ws-url:focus { border-color: var(--dim); color: var(--text); }

  #btn {
    padding: 9px 20px; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem; font-weight: 500; background: var(--surface);
    color: var(--text); border: 1px solid var(--border); border-radius: 3px;
    cursor: pointer; white-space: nowrap; transition: all 0.15s; letter-spacing: 0.05em;
  }
  #btn:hover:not(:disabled) { border-color: var(--dim); color: #fff; }
  #btn.live { border-color: var(--green); color: var(--green); background: #0d1f12; }
  #btn:disabled { opacity: 0.35; cursor: not-allowed; }

  aside { grid-area: sidebar; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }

  .panel { border-bottom: 1px solid var(--border); padding: 16px; }
  .panel-title { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; margin-bottom: 12px; }

  #status-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--dim); margin-right: 6px; transition: background 0.3s;
  }
  #status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #status-dot.error     { background: var(--red); }
  #status-dot.speaking  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  #status-text { font-size: 0.75rem; color: var(--muted); }

  .meter-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .meter-label { font-size: 0.6rem; color: var(--muted); width: 24px; }
  .meter-track { flex: 1; height: 3px; background: var(--surface); border-radius: 2px; overflow: hidden; }
  .meter-fill  { height: 100%; width: 0%; border-radius: 2px; background: var(--green); transition: width 0.04s; }

  .buffer-nums { display: flex; justify-content: space-between; margin-bottom: 6px; }
  #buf-ms   { font-size: 0.9rem; color: var(--amber); }
  #buf-peak { font-size: 0.65rem; color: var(--muted); }
  .buf-track { width: 100%; height: 3px; background: var(--surface); border-radius: 2px; overflow: hidden; }
  #buf-bar  { height: 100%; width: 0%; background: var(--amber); border-radius: 2px; transition: width 0.06s, background 0.3s; }
  #buf-bar.flush { animation: barFlush 0.4s ease-out forwards; }
  @keyframes barFlush { 0% { background: var(--red); width: 100%; } 100% { background: var(--red); width: 0%; } }

  #log {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 3px;
    font-size: 0.68rem; min-height: 0;
  }
  #log::-webkit-scrollbar { width: 2px; }
  #log::-webkit-scrollbar-thumb { background: var(--dim); }
  .log-entry { color: var(--muted); line-height: 1.4; }
  .log-entry .ts  { color: var(--dim); margin-right: 6px; }
  .log-entry.ok   .msg { color: var(--green); }
  .log-entry.err  .msg { color: var(--red); }
  .log-entry.info .msg { color: var(--muted); }
  .log-entry.int  .msg { color: var(--red); }
  .log-entry.turn .msg { color: var(--blue); }

  footer {
    grid-area: footer; background: var(--bg);
    padding: 8px 24px; display: flex; align-items: center; gap: 16px;
    border-top: 1px solid var(--border);
  }
  footer .f-item { font-size: 0.65rem; color: var(--muted); }
  footer .f-item .k { color: var(--dim); }

  #vad-state { margin-left: auto; font-size: 0.65rem; color: var(--dim); display: flex; align-items: center; gap: 5px; }
  #vad-dot   { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); transition: background 0.1s; }
  #vad-dot.speech { background: var(--red); box-shadow: 0 0 4px var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">rust<span>vani</span></div>
  <div class="header-right">
    <div class="stat-pill">turns <span class="val" id="turn-count">0</span></div>
    <div class="stat-pill">interrupts <span class="val red" id="int-count">0</span></div>
  </div>
</header>

<main>
  <div id="transcript">
    <div class="tx-placeholder" id="tx-placeholder">connect to begin</div>
  </div>
  <div class="connect-row">
    <input id="ws-url" type="text" value="wss://rustvani.onrender.com/ws" spellcheck="false" />
    <button id="btn">connect</button>
  </div>
</main>

<aside>
  <div class="panel">
    <div class="panel-title">STATUS</div>
    <div><span id="status-dot"></span><span id="status-text">idle</span></div>
    <div class="meter-row">
      <span class="meter-label">mic</span>
      <div class="meter-track"><div class="meter-fill" id="mic-meter"></div></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">PLAYBACK BUFFER</div>
    <div class="buffer-nums">
      <span id="buf-ms">— ms</span>
      <span id="buf-peak">peak —</span>
    </div>
    <div class="buf-track"><div id="buf-bar"></div></div>
  </div>
  <div id="log"></div>
</aside>

<footer>
  <div class="f-item"><span class="k">protocol</span> ravi 1.2.0</div>
  <div class="f-item"><span class="k">vad</span> silero @0.7</div>
  <div class="f-item"><span class="k">capture</span> 16 kHz pcm</div>
  <div id="vad-state"><div id="vad-dot"></div><span id="vad-label">vad off</span></div>
</footer>

<script type="module">
import { RaviClient } from './src/ravi/client.js';
import { RaviVad }    from './src/audio/vad.js';

const $ = id => document.getElementById(id);
const el = {
  btn:         $('btn'),
  url:         $('ws-url'),
  statusDot:   $('status-dot'),
  statusText:  $('status-text'),
  micMeter:    $('mic-meter'),
  bufMs:       $('buf-ms'),
  bufPeak:     $('buf-peak'),
  bufBar:      $('buf-bar'),
  log:         $('log'),
  transcript:  $('transcript'),
  placeholder: $('tx-placeholder'),
  turnCount:   $('turn-count'),
  intCount:    $('int-count'),
  vadDot:      $('vad-dot'),
  vadLabel:    $('vad-label'),
};

let client    = null;
let vad       = null;
let rafHandle = null;
let peakMs    = 0;
let _botBubble = null;
let _botAccum  = '';

// ---- Helpers ----

function setStatus(text, cls = '') {
  el.statusText.textContent = text;
  el.statusDot.className    = cls;
}

function log(msg, level = 'info') {
  const t   = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const row = document.createElement('div');
  row.className = `log-entry ${level}`;
  row.innerHTML = `<span class="ts">${t}</span><span class="msg">${msg}</span>`;
  el.log.appendChild(row);
  el.log.scrollTop = el.log.scrollHeight;
}

function addUserTranscript(text, isFinal) {
  if (!text.trim() || !isFinal) return;
  el.placeholder.style.display = 'none';
  const e = document.createElement('div');
  e.className = 'tx-entry user';
  e.innerHTML = `<div class="tx-label">you</div><div class="tx-bubble">${text}</div>`;
  el.transcript.appendChild(e);
  el.transcript.scrollTop = el.transcript.scrollHeight;
}

function appendBotToken(text) {
  el.placeholder.style.display = 'none';
  if (!_botBubble) {
    const e = document.createElement('div');
    e.className = 'tx-entry bot';
    e.innerHTML = '<div class="tx-label">vani</div><div class="tx-bubble streaming"></div>';
    el.transcript.appendChild(e);
    _botBubble = e.querySelector('.tx-bubble');
    _botAccum  = '';
  }
  _botAccum += text;
  _botBubble.textContent = _botAccum;
  el.transcript.scrollTop = el.transcript.scrollHeight;
}

function finalizeBotBubble() {
  if (_botBubble) { _botBubble.classList.remove('streaming'); _botBubble = null; _botAccum = ''; }
}

function startBufferLoop() {
  function tick() {
    if (!client?.isRunning) return;
    const ms = client.bufferedMs;
    if (client.peakMs > peakMs) peakMs = client.peakMs;
    el.bufMs.textContent   = ms.toFixed(0) + ' ms';
    el.bufPeak.textContent = 'peak ' + peakMs.toFixed(0);
    el.bufBar.style.width  = Math.min(100, (ms / 15_000) * 100).toFixed(1) + '%';
    const c = ms < 500 ? 'var(--green)' : ms < 5_000 ? 'var(--amber)' : 'var(--red)';
    el.bufBar.style.background = c;
    el.bufMs.style.color       = c;
    rafHandle = requestAnimationFrame(tick);
  }
  rafHandle = requestAnimationFrame(tick);
}

function stopBufferLoop() {
  if (rafHandle) { cancelAnimationFrame(rafHandle); rafHandle = null; }
  el.bufMs.textContent   = '— ms';
  el.bufPeak.textContent = 'peak —';
  el.bufBar.style.width  = '0%';
  peakMs = 0;
}

// ---- Connect / disconnect ----

async function connect() {
  el.btn.disabled = true;
  setStatus('connecting…', '');

  client = new RaviClient({
    onConnected()     { setStatus('connected', 'connected'); el.btn.textContent = 'disconnect'; el.btn.classList.add('live'); el.btn.disabled = false; startBufferLoop(); log('connected', 'ok'); },
    onDisconnected()  { teardown(); },
    onBotReady()      { setStatus('ready', 'connected'); },
    onBotStartedSpeaking() { setStatus('bot speaking', 'speaking'); },
    onBotStoppedSpeaking() { setStatus('ready', 'connected'); finalizeBotBubble(); },
    onUserStartedSpeaking() { setStatus('listening…', 'connected'); },
    onUserStoppedSpeaking() { setStatus('processing…', 'connected'); },
    onUserTranscript(data)  { addUserTranscript(data.text, data.final); },
    onBotLlmStarted()  { log('llm started', 'info'); },
    onBotLlmStopped()  { log('llm stopped', 'info'); },
    onBotLlmText(text) { appendBotToken(text); },
    onInterrupt(source, flushedMs, count) {
      el.intCount.textContent = count;
      el.bufBar.classList.remove('flush');
      void el.bufBar.offsetWidth;
      el.bufBar.classList.add('flush');
      setTimeout(() => el.bufBar.classList.remove('flush'), 500);
      setStatus('interrupted', 'error');
      setTimeout(() => { if (client?.isRunning) setStatus('ready', 'connected'); }, 1_000);
      log(`interrupt [${source}] — flushed ${flushedMs.toFixed(0)} ms`, 'int');
    },
    onTurn(n, latencyMs)   { el.turnCount.textContent = n; log(`turn ${n} — ${latencyMs.toFixed(0)} ms`, 'turn'); },
    onAudioLevel(peak)     { el.micMeter.style.width = Math.min(100, peak * 200) + '%'; },
    onError(msg)           { log(msg, 'err'); setStatus('error', 'error'); },
    onLog(msg, level)      { log(msg, level); },
  });

  const raw = el.url.value.trim();
  const url = raw.startsWith('ws') ? raw : 'wss://' + raw;

  try {
    await client.connect(url);
  } catch (e) {
    log('connect failed: ' + e.message, 'err');
    setStatus('failed', 'error');
    client = null;
    el.btn.disabled = false;
    return;
  }

  // Start VAD after client is connected.
  // VAD calls client.interrupt('vad') on speech — client owns whether to act on it.
  vad = new RaviVad({
    onSpeechStart: () => {
      el.vadDot.classList.add('speech');
      client.interrupt('vad');  // no-op if bot not speaking
    },
    onSpeechEnd: () => {
      el.vadDot.classList.remove('speech');
    },
  });

  try {
    await vad.start();
    el.vadLabel.textContent = 'vad active';
    log('vad ready (threshold 0.70)', 'ok');
  } catch (e) {
    log('vad failed: ' + e.message, 'err');
  }
}

function teardown() {
  stopBufferLoop();
  finalizeBotBubble();
  vad?.stop();
  vad = null;
  el.btn.textContent = 'connect';
  el.btn.classList.remove('live');
  el.btn.disabled    = false;
  el.micMeter.style.width = '0%';
  el.vadDot.classList.remove('speech');
  el.vadLabel.textContent = 'vad off';
  setStatus('idle', '');
  log('disconnected', 'err');
  client = null;
}

function disconnect() { client?.disconnect(); teardown(); }

el.btn.addEventListener('click', () => {
  if (client?.isRunning) disconnect();
  else                   connect();
});
</script>
</body>
</html>
