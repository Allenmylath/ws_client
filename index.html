<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>rustvani client</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: monospace;
    background: #0d0d0d;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }
  h1 { font-size: 1.1rem; color: #888; letter-spacing: 2px; }

  #status {
    font-size: 0.85rem;
    color: #555;
    min-height: 1.2em;
  }
  #status.connected { color: #4caf50; }
  #status.error     { color: #f44336; }

  #btn {
    padding: 14px 40px;
    font-family: monospace;
    font-size: 1rem;
    background: #1a1a1a;
    color: #e0e0e0;
    border: 1px solid #333;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    min-width: 180px;
  }
  #btn:hover  { background: #222; border-color: #555; }
  #btn.active { border-color: #4caf50; color: #4caf50; }
  #btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #url-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #url-row label { color: #555; font-size: 0.8rem; }
  #ws-url {
    background: #111;
    border: 1px solid #2a2a2a;
    color: #aaa;
    font-family: monospace;
    font-size: 0.85rem;
    padding: 6px 10px;
    border-radius: 3px;
    width: 340px;
  }

  #meter-wrap {
    width: 280px;
    height: 6px;
    background: #1a1a1a;
    border-radius: 3px;
    overflow: hidden;
  }
  #meter {
    height: 100%;
    width: 0%;
    background: #4caf50;
    transition: width 0.05s;
  }

  #log {
    width: 420px;
    height: 200px;
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 0.75rem;
    color: #555;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #log .entry { color: #666; }
  #log .entry.ok      { color: #4caf50; }
  #log .entry.err     { color: #f44336; }
  #log .entry.info    { color: #888; }
  #log .entry.latency { color: #ffab00; }
</style>
</head>
<body>

<h1>RUSTVANI</h1>

<div id="url-row">
  <label>wss://</label>
  <input id="ws-url" type="text" value="rustvani.onrender.com/ws" />
</div>

<button id="btn">Connect &amp; Record</button>

<div id="meter-wrap"><div id="meter"></div></div>

<div id="status">idle</div>

<div id="log"></div>

<script>
// ---------------------------------------------------------------------------
// Constants — must match rustvani server
// ---------------------------------------------------------------------------
const SAMPLE_RATE    = 16000;
const CHUNK_SAMPLES  = 512;
const CHUNK_BYTES    = CHUNK_SAMPLES * 2;
const PLAYBACK_RATE  = 16000;

// ---------------------------------------------------------------------------
// AudioWorklet source — inline as a blob
// ---------------------------------------------------------------------------
const WORKLET_SRC = `
class PCMCapture extends AudioWorkletProcessor {
  constructor () {
    super();
    this._buf = new Float32Array(0);
  }

  process (inputs) {
    const ch = inputs[0]?.[0];
    if (!ch) return true;

    const merged = new Float32Array(this._buf.length + ch.length);
    merged.set(this._buf);
    merged.set(ch, this._buf.length);
    this._buf = merged;

    const CHUNK = ${CHUNK_SAMPLES};

    while (this._buf.length >= CHUNK) {
      const slice  = this._buf.slice(0, CHUNK);
      this._buf    = this._buf.slice(CHUNK);

      const i16  = new Int16Array(CHUNK);
      let   peak = 0;
      for (let i = 0; i < CHUNK; i++) {
        const s  = Math.max(-1, Math.min(1, slice[i]));
        i16[i]   = s < 0 ? s * 0x8000 : s * 0x7FFF;
        const a  = Math.abs(s);
        if (a > peak) peak = a;
      }

      this.port.postMessage({ pcm: i16.buffer, peak }, [i16.buffer]);
    }
    return true;
  }
}
registerProcessor('pcm-capture', PCMCapture);
`;

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let ws          = null;
let audioCtx    = null;
let workletNode = null;
let micStream   = null;
let running     = false;

// Playback scheduling
let playNextAt  = 0;

// Latency tracking
let lastSendTime   = 0;       // performance.now() of last ws.send()
let receiving      = false;   // true while server is streaming audio back
let turnCount      = 0;

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
const btn    = document.getElementById('btn');
const status = document.getElementById('status');
const meter  = document.getElementById('meter');
const logBox = document.getElementById('log');

function setStatus(msg, cls = '') {
  status.textContent = msg;
  status.className   = cls;
}

function log(msg, cls = 'entry') {
  const t   = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const div = document.createElement('div');
  div.className = `entry ${cls}`;
  div.textContent = `${t}  ${msg}`;
  logBox.appendChild(div);
  logBox.scrollTop = logBox.scrollHeight;
}

// ---------------------------------------------------------------------------
// Playback — decode i16 LE PCM and schedule gapless AudioBuffers
// ---------------------------------------------------------------------------
function playPcm(arrayBuf) {
  if (!audioCtx || !running) return;

  const i16     = new Int16Array(arrayBuf);
  const samples = i16.length;

  const audioBuf = audioCtx.createBuffer(1, samples, PLAYBACK_RATE);
  const channel  = audioBuf.getChannelData(0);

  for (let i = 0; i < samples; i++) {
    channel[i] = i16[i] / 32768.0;
  }

  const src = audioCtx.createBufferSource();
  src.buffer = audioBuf;
  src.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  if (playNextAt < now) {
    playNextAt = now;
  }

  src.start(playNextAt);
  playNextAt += audioBuf.duration;
}

// ---------------------------------------------------------------------------
// Start
// ---------------------------------------------------------------------------
async function start() {
  btn.disabled = true;
  setStatus('requesting mic…');

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    setStatus('mic denied', 'error');
    log('mic error: ' + e.message, 'err');
    btn.disabled = false;
    return;
  }

  audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
  log(`AudioContext sampleRate: ${audioCtx.sampleRate} Hz`, 'info');

  playNextAt   = 0;
  receiving    = false;
  lastSendTime = 0;
  turnCount    = 0;

  const blob = new Blob([WORKLET_SRC], { type: 'application/javascript' });
  const blobUrl = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(blobUrl);
  URL.revokeObjectURL(blobUrl);

  const src = audioCtx.createMediaStreamSource(micStream);
  workletNode = new AudioWorkletNode(audioCtx, 'pcm-capture');
  src.connect(workletNode);

  // Connect WebSocket
  const urlInput = document.getElementById('ws-url').value.trim();
  const wsUrl    = 'wss://' + urlInput;
  log(`connecting to ${wsUrl}`, 'info');
  setStatus('connecting…');
  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    log('connected', 'ok');
    setStatus('connected — recording', 'connected');
    running = true;
    btn.textContent = 'Stop';
    btn.classList.add('active');
    btn.disabled = false;

    // Mic → server
    workletNode.port.onmessage = ({ data }) => {
      if (!running || ws.readyState !== WebSocket.OPEN) return;
      meter.style.width = Math.min(100, data.peak * 200) + '%';
      ws.send(data.pcm);
      lastSendTime = performance.now();

      // If we were receiving audio and user starts talking again,
      // reset for next turn
      if (receiving) {
        receiving = false;
      }
    };
  };

  // Server → speakers + latency tracking
  ws.onmessage = (evt) => {
    if (!(evt.data instanceof ArrayBuffer) || evt.data.byteLength === 0) return;

    // First audio chunk of a new response
    if (!receiving) {
      receiving = true;
      turnCount++;
      const latencyMs = performance.now() - lastSendTime;
      log(
        `[turn ${turnCount}] speech→speech: ${latencyMs.toFixed(0)}ms`,
        'latency'
      );
    }

    playPcm(evt.data);
  };

  ws.onclose = () => {
    log('disconnected', 'err');
    stop(false);
  };

  ws.onerror = () => {
    log('WebSocket error', 'err');
    setStatus('connection error', 'error');
  };
}

// ---------------------------------------------------------------------------
// Stop
// ---------------------------------------------------------------------------
function stop(sendClose = true) {
  running   = false;
  playNextAt = 0;
  receiving  = false;

  if (ws) {
    if (sendClose && ws.readyState === WebSocket.OPEN) ws.close();
    ws = null;
  }
  if (workletNode) {
    workletNode.disconnect();
    workletNode.port.onmessage = null;
    workletNode = null;
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
  }

  meter.style.width = '0%';
  btn.textContent = 'Connect & Record';
  btn.classList.remove('active');
  btn.disabled = false;
  setStatus('idle');
  log('stopped', 'info');
}

// ---------------------------------------------------------------------------
// Button
// ---------------------------------------------------------------------------
btn.addEventListener('click', () => {
  if (running) stop();
  else         start();
});
</script>
</body>
</html>
